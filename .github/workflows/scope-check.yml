name: Scope Check
on:
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate scope
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get changed files
        id: changed
        uses: tj-actions/changed-files@v44

      - name: Run scope check
        run: |
          python3 .github/scripts/scope_check.py \
            --changed "${{ steps.changed.outputs.all_changed_files }}" \
            --scope .agios/scope.json
