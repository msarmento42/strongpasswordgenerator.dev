name: AGIOS Queue Health Check

on:
  schedule:
    - cron: '0 */4 * * *'   # every 4 hours
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - '.github/workflows/queue-health.yml'
      - '.github/scripts/**'

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate issue schemas
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 .github/scripts/validate_issues.py

      - name: Reset stale in-progress locks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 .github/scripts/reset_stale_locks.py
